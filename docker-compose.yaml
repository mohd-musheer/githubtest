version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: cicd-postgres
    environment:
      POSTGRES_USER: cicd_user
      POSTGRES_PASSWORD: cicd_password
      POSTGRES_DB: cicd_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cicd-network

  # Jenkins CI/CD Server
  jenkins:
    image: jenkins/jenkins:lts
    container_name: cicd-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--httpPort=8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd-network
    depends_on:
      - postgres

  # GitLab Container Registry (Demo)
  registry:
    image: registry:2
    container_name: cicd-registry
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - cicd-network

  # Sonarqube for Code Quality
  sonarqube:
    image: sonarqube:latest
    container_name: cicd-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/cicd_db
      SONAR_JDBC_USERNAME: cicd_user
      SONAR_JDBC_PASSWORD: cicd_password
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - cicd-network
    depends_on:
      - postgres

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cicd-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cicd-network

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cicd-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cicd-network
    depends_on:
      - prometheus

  # Nginx as Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cicd-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cicd-network
    depends_on:
      - jenkins
      - sonarqube
      - grafana

volumes:
  postgres_data:
  jenkins_home:
  registry_data:
  sonarqube_data:
  sonarqube_extensions:
  prometheus_data:
  grafana_data:

networks:
  cicd-network:
    driver: bridge
